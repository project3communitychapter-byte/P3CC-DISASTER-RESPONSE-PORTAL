<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="p3cc.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #050505; --dark-grey: #1a1a1a; --white: #ffffff; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--white); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; 
            transition: 0.3s; 
        }
        .light-mode { background: #e0e0e0; color: var(--black); }
        
        header { text-align: center; padding: 30px; border-bottom: 3px solid var(--gold); }
        .logo-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .logo-container img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 2px solid var(--gold); }
        h1 { font-size: 2.5rem; letter-spacing: 2px; color: var(--gold); }

        .container { max-width: 900px; margin: auto; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 20px; border: 1px solid var(--gold); }
        
        .radar-container { width: 100%; height: 400px; border: 3px solid var(--gold); border-radius: 15px; margin-bottom: 30px; overflow: hidden; }
        #map { width: 100%; height: 400px; background: #222; border: 3px solid var(--gold); border-radius: 15px; margin-bottom: 30px; }

        input { width: 100%; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 1.2rem; box-sizing: border-box; background: #111; border: 1px solid #333; color: white; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-submit { width: 100%; padding: 20px; margin: 10px 0; border-radius: 10px; font-size: 1.2rem; background: var(--gold); color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; transform: scale(1.01); }
        .btn-submit:disabled { background: #444; cursor: not-allowed; }

        .card { background: rgba(26, 26, 26, 0.9); border-left: 5px solid var(--gold); padding: 25px; margin: 20px 0; border-radius: 0 15px 15px 0; text-align: center; width: 90%; }
        .hotline-container { display: flex; flex-direction: column; align-items: center; }

        footer { text-align: center; padding: 40px; border-top: 2px solid var(--gold); margin-top: 50px; font-size: 1.1rem; }
        #clock { font-size: 2rem; font-weight: bold; margin-bottom: 10px; color: var(--gold); }
    </style>
</head>
<body onload="initMap()">

<header>
    <div class="logo-container">
        <img src="p3cc.png" alt="Logo">
        <img src="quirinosec.jpg" alt="Logo">
        <img src="tgp.png" alt="Logo">
        <img src="quirino.png" alt="Logo">
        <img src="rider.png" alt="Logo">
    </div>
    <h1>P3CC DISASTER PORTAL</h1>
</header>

<div class="container">
    <h2 style="color:var(--gold)">Live Weather & Disaster Radar</h2>
    <div class="radar-container">
        <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=14.6&lon=121.0&zoom=8&overlay=radar" frameborder="0" allow="geolocation"></iframe>
    </div>

    <div id="map"></div>

    <form id="emergencyForm">
        <h2 style="color:var(--gold); text-align: center;">Report Emergency</h2>
        <input type="text" id="type" placeholder="Type of emergency" required>
        <input type="text" id="loc" placeholder="Location" oninput="checkAlert()" required>
        <div id="alertBox" style="color:#ff0000; font-size: 1.5rem; font-weight:bold; display:none; padding: 10px; text-align: center;">⚠️ RED ALERT: SUNOG!</div>
        <input type="text" id="name" placeholder="Reporter Name" required>
        <input type="text" id="contact" placeholder="Contact number" required>
        <button type="button" class="btn-submit" onclick="submitData()">SUBMIT EMERGENCY REPORT</button>
    </form>

    <div id="hotline" class="hotline-container">
        <h2 style="color:var(--gold)">Emergency Hotline</h2>
        <div class="card"><h3><i class="fas fa-phone"></i> QCDRRMO</h3><p>122 | (02)8928-4333 | 0917-881-9999</p></div>
    </div>
    
    <div id="clock"></div>
</div>

<script>
    let map, fireMarker;

    function initMap() {
        map = L.map('map').setView([14.6091, 121.0223], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
    }

    function checkAlert() {
        let loc = document.getElementById('loc').value.toLowerCase();
        let alertBox = document.getElementById('alertBox');
        if (loc.includes('red')) {
            alertBox.style.display = 'block';
            if (!fireMarker) {
                fireMarker = L.marker([14.6091, 121.0223]).addTo(map).bindPopup("SUNOG ALERT!").openPopup();
            }
        } else {
            alertBox.style.display = 'none';
            if (fireMarker) { map.removeLayer(fireMarker); fireMarker = null; }
        }
    }

    function submitData() {
        const type = document.getElementById('type').value.trim();
        const loc = document.getElementById('loc').value.trim();
        const name = document.getElementById('name').value.trim();
        const contact = document.getElementById('contact').value.trim();

        if (!type || !loc || !name || !contact) {
            alert("⚠️ BABALA: Pakipunan ang lahat ng field.");
            return;
        }

        const btn = document.querySelector('.btn-submit');
        btn.disabled = true;
        btn.innerText = "Processing...";

        var data = { emergencyType: type, location: loc, reporterName: name, contactNumber: contact };
        google.script.run
            .withSuccessHandler(function() {
                alert("✅ Report Submitted Successfully!");
                document.getElementById('emergencyForm').reset();
                btn.disabled = false;
                btn.innerText = "SUBMIT EMERGENCY REPORT";
            })
            .withFailureHandler(function(err) {
                alert("Error: " + err);
                btn.disabled = false;
                btn.innerText = "SUBMIT EMERGENCY REPORT";
            })
            .processForm(data);
    }

    // Fixed clock function
    setInterval(() => {
        const clockElement = document.getElementById('clock');
        if (clockElement) {
            clockElement.innerText = new Date().toLocaleTimeString();
        }
    }, 1000);
</script>
</body>
</html>
